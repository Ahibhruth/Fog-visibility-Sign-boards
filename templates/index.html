<!DOCTYPE html>
<html>
<head>
    <title>Driver Assistant</title>
    <style>
        body { margin:0; background:#111; color:white; font-family:Arial; }
        h2 { text-align:center; margin:10px; }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.75);
            padding: 10px;
            border-radius: 10px;
        }
        button {
            display: block;
            margin: 5px 0;
            padding: 10px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            width: 180px;
            font-size: 14px;
        }
        button:hover { background:#444; }
        button.active { background:#1a5c1a; border-color:#0f0; }

        #map { height: 90vh; }

        /* ── FOG — light enough to see road, hides surroundings ── */
        #fog-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 400;
            background: radial-gradient(
    ellipse 18% 15% at 50% 50%,
    rgba(180, 200, 220, 0.30)  0%,
    rgba(172, 196, 218, 0.82) 22%,
    rgba(165, 190, 215, 0.95) 40%,
    rgba(160, 185, 212, 0.98) 60%,
    rgba(155, 182, 210, 1.00) 100%
);
            
        }
        #fog-overlay.on { display: block; }

        /* ── ALERT TOAST ── */
        #alert-toast {
            display: none;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.92);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            border-left: 5px solid #00e5ff;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 2000;
            pointer-events: none;
            white-space: nowrap;
        }
        #alert-toast.show { display: block; }

        /* ── TRAFFIC LIGHT WIDGET ── */
        #traffic-light {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            background: #1a1a1a;
            border: 3px solid #444;
            border-radius: 14px;
            padding: 12px 14px;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #traffic-light.show { display: flex; }
        .tl-circle {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid #444;
            transition: background 0.4s, box-shadow 0.4s;
        }
        #tl-red.lit    { background:#ff1744; box-shadow:0 0 16px #ff1744; }
        #tl-yellow.lit { background:#ffab00; box-shadow:0 0 16px #ffab00; }
        #tl-green.lit  { background:#00e676; box-shadow:0 0 16px #00e676; }

        /* ── PEDESTRIAN STATUS BOX ── */
        #ped-status {
            display: none;
            position: fixed;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,23,68,0.15);
            border: 2px solid #ff1744;
            color: #ff1744;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 2001;
            pointer-events: none;
            letter-spacing: 1px;
        }
        #ped-status.show { display: block; }

        #school-status {
    display: none;
    position: fixed;
    top: 195px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,152,0,0.15);
    border: 2px solid #ff9800;
    color: #ff9800;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 1rem;
    z-index: 2001;
    pointer-events: none;
    letter-spacing: 1px;
}
#school-status.show { display: block; }

        /* ── ARROW PAD ── */
        #arrow-pad {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #arrow-row { display:flex; gap:4px; }
        .arrow-btn {
            width: 54px; height: 54px;
            background: rgba(0,0,0,0.82);
            color: white;
            border: 1px solid #666;
            border-radius: 8px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex; align-items:center; justify-content:center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .arrow-btn:active { background:#333; }
    </style>
</head>
<body>

<h2>🚗 DRIVER ASSISTANT SYSTEM</h2>

<div id="fog-overlay"></div>
<div id="alert-toast"></div>

<!-- Traffic Light -->
<div id="traffic-light">
    <div class="tl-circle" id="tl-red"></div>
    <div class="tl-circle" id="tl-yellow"></div>
    <div class="tl-circle" id="tl-green"></div>
</div>

<!-- Pedestrian 5-sec warning -->
<div id="ped-status">🚶 PEDESTRIAN CROSSING — WAIT 5 SEC</div>
<div id="school-status">🏫 SCHOOL ZONE — SLOW DOWN</div>

<div id="controls">
    <button id="btn-signal"   onclick="setMode('signal')">🚦 Add Signal</button>
    <button id="btn-hump"     onclick="setMode('hump')"> Add Speed Breaker</button>
    <button id="btn-crossing" onclick="setMode('crossing')">🚶 Add Crossing</button>
    <button id="btn-school"   onclick="setMode('school')">🏫 Add School Zone</button>
    <button id="btn-delete"   onclick="setMode('delete')">🗑️ Delete Mode</button>
    <hr style="border-color:#444;margin:6px 0;">
    <button onclick="toggleFog()">🌫 Toggle Fog</button>
</div>

<div id="arrow-pad">
    <button class="arrow-btn"
    onmousedown="startMove('forward')"  onmouseup="stopMove('forward')"
    ontouchstart="startMove('forward')" ontouchend="stopMove('forward')">▲</button>

<button class="arrow-btn"
    onmousedown="startMove('left')"  onmouseup="stopMove('left')"
    ontouchstart="startMove('left')" ontouchend="stopMove('left')">◀</button>

<button class="arrow-btn"
    onmousedown="startMove('backward')"  onmouseup="stopMove('backward')"
    ontouchstart="startMove('backward')" ontouchend="stopMove('backward')">▼</button>

<button class="arrow-btn"
    onmousedown="startMove('right')"  onmouseup="stopMove('right')"
    ontouchstart="startMove('right')" ontouchend="stopMove('right')">▶</button>
    </div>
</div>

<div id="map"></div>

<script src="/static/script.js"></script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGJeClSZ5MPW5ZzPLiKA6-zPqbXPOsvyU&callback=initMap">
</script>
</body>
</html>
